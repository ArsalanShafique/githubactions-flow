deploy:
  needs: build
  runs-on: ubuntu-latest

  steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd githubactions-flow || git clone https://github.com/ArsalanShafique/githubactions-flow.git
          cd githubactions-flow

          git pull origin main

          npm install

          pm2 restart backend || pm2 start backend.js